<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SPAREN</title>

<style>

body{
font-family:-apple-system;
background:#0f172a;
margin:0;
color:white;
padding-bottom:80px;
}

header{
padding:20px;
text-align:center;
font-size:24px;
font-weight:600;
}

.container{
padding:16px;
}

.card{
background:#1e293b;
border-radius:20px;
padding:20px;
margin-bottom:14px;
}

.title{
opacity:0.7;
font-size:14px;
}

.big{
font-size:36px;
font-weight:600;
margin-top:6px;
}

button{
background:#34c759;
border:none;
padding:12px;
border-radius:10px;
margin-top:10px;
width:100%;
font-size:16px;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
margin-top:10px;
font-size:16px;
}

</style>

</head>

<body>

<header>SPAREN</header>

<div class="container">

<div class="card">

<div class="title">Nog te besteden deze maand</div>

<div class="big">€<span id="rest">517</span></div>

</div>

<div class="card">

<div class="title">Weekbudget</div>

<div class="big">€<span id="week">129</span></div>

</div>

<div class="card">

<div class="title">Uitgave toevoegen</div>

<input id="bedrag" placeholder="bedrag">

<button onclick="uitgave()">Toevoegen</button>

</div>

<div class="card">

<div class="title">Uitgaven</div>

<div id="lijst"></div>

</div>

</div>

<script>

let maandBudget = 517
let besteed = Number(localStorage.getItem("besteed") || 0)

let uitgaven = JSON.parse(localStorage.getItem("uitgaven") || "[]")

function update(){

let rest = maandBudget - besteed

document.getElementById("rest").innerText = rest

let vandaag = new Date()

let dag = vandaag.getDate()

let weken = Math.ceil((30 - dag) / 7)

if(weken < 1) weken = 1

let weekBudget = Math.round(rest / weken)

document.getElementById("week").innerText = weekBudget

let html=""

uitgaven.forEach(u=>{
html += "€"+u+"<br>"
})

document.getElementById("lijst").innerHTML = html

}

function uitgave(){

let bedrag = Number(document.getElementById("bedrag").value)

besteed += bedrag

uitgaven.push(bedrag)

localStorage.setItem("besteed", besteed)
localStorage.setItem("uitgaven", JSON.stringify(uitgaven))

update()

}

update()

</script>

</body>
</html>
